[profile.default]
src         = "src"
out         = "out"
libs        = ["lib"]
test        = "test"
script      = "script"
solc_version = "0.8.24"
optimizer   = true
optimizer_runs = 200
via_ir      = false
verbosity   = 2

[fmt]
line_length = 100
tab_width   = 4
bracket_spacing = true
int_types   = "long"
quote_style = "double"

[rpc_endpoints]
galileo = "${OG_EVM_RPC}"

[etherscan]
# 0G doesn't ship a verifier yet — leave placeholders.
galileo = { key = "${ETHERSCAN_API_KEY}", url = "https://chainscan-galileo.0g.ai/api" }

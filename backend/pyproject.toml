[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["app/db/migrations/versions/*"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "N", "RUF"]
ignore = ["B008", "N806"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-q --strict-markers"
